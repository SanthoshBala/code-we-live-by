name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deployment at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.AR_REPO }}
  CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}

jobs:
  # Run CI first
  ci:
    uses: ./.github/workflows/ci.yml

  # Detect whether this commit touches seed-related files to skip the expensive
  # seed job (API ingestion + pipeline runs) on unrelated changes.
  check-seed:
    name: Check if seed needed
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      seed_needed: ${{ steps.check.outputs.seed_needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check seed-related file changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^backend/(alembic|pipeline)/|^backend/scripts/seed|^\.github/workflows/cd\.yml$'; then
            echo "seed_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "seed_needed=false" >> "$GITHUB_OUTPUT"
          fi

  # Detect which services changed so we can skip unchanged image builds.
  check-changes:
    name: Detect changed services
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.check.outputs.backend_changed }}
      frontend_changed: ${{ steps.check.outputs.frontend_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check which services changed
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE '^backend/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^frontend/'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-backend:
    name: Build Backend Image
    needs: [ci, check-changes]
    if: needs.check-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push backend image
        run: |
          BACKEND_TAG="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPO/cwlb-backend:$GITHUB_SHA"
          BACKEND_LATEST="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPO/cwlb-backend:latest"
          BUILD_ID=$(gcloud builds submit backend/ \
            --config backend/cloudbuild.yaml \
            --substitutions "_IMAGE_TAG=$BACKEND_TAG,_IMAGE_LATEST=$BACKEND_LATEST" \
            --async --format='value(id)' --quiet)
          echo "Waiting for build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' --quiet)
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build $BUILD_ID succeeded"
              break
            fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build $BUILD_ID failed with status: $STATUS"
              gcloud builds log "$BUILD_ID" --quiet || true
              exit 1
            fi
            sleep 5
          done

  # Runs in parallel with build-backend — only needs the currently-deployed
  # backend URL, not the newly-built image.
  build-frontend:
    name: Build Frontend Image
    needs: [ci, check-changes]
    if: needs.check-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe cwlb-backend \
            --region "$GCP_REGION" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          FRONTEND_BASE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPO/cwlb-frontend"
          IMAGE_TAG="$FRONTEND_BASE:$GITHUB_SHA"
          IMAGE_LATEST="$FRONTEND_BASE:latest"
          DEPS_CACHE="$FRONTEND_BASE:cache-deps"
          BUILD_CACHE="$FRONTEND_BASE:cache-build"
          BUILD_ID=$(gcloud builds submit frontend/ \
            --config frontend/cloudbuild.yaml \
            --substitutions "_IMAGE_TAG=$IMAGE_TAG,_IMAGE_LATEST=$IMAGE_LATEST,_DEPS_CACHE=$DEPS_CACHE,_BUILD_CACHE=$BUILD_CACHE,_BACKEND_URL=${{ steps.backend-url.outputs.url }}" \
            --async --format='value(id)' --quiet)
          echo "Waiting for build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' --quiet)
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build $BUILD_ID succeeded"
              break
            fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build $BUILD_ID failed with status: $STATUS"
              gcloud builds log "$BUILD_ID" --quiet || true
              exit 1
            fi
            sleep 5
          done

  deploy-backend:
    name: Deploy Backend
    needs: [check-changes, build-backend]
    # Run even when build-backend was skipped (backend unchanged); gate on
    # check-changes succeeding so CI failures still block deployment.
    if: always() && needs.check-changes.result == 'success' && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve backend image tag
        id: image
        run: |
          BASE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPO/cwlb-backend"
          if [ "${{ needs.check-changes.outputs.backend_changed }}" = "true" ]; then
            echo "tag=$BASE:$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$BASE:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy cwlb-backend \
            --image "${{ steps.image.outputs.tag }}" \
            --region "$GCP_REGION" \
            --platform managed \
            --port 8080 \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,GCS_CACHE_BUCKET=GCS_CACHE_BUCKET:latest,GOVINFO_API_KEY=GOVINFO_API_KEY:latest,CONGRESS_API_KEY=CONGRESS_API_KEY:latest" \
            --set-env-vars "DEPLOY_SHA=$GITHUB_SHA" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 3 \
            --memory 512Mi \
            --quiet

      - name: Run migrations
        run: |
          gcloud run jobs deploy cwlb-migrate \
            --image "${{ steps.image.outputs.tag }}" \
            --region "$GCP_REGION" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 512Mi \
            --task-timeout 5m \
            --command "bash" \
            --args "scripts/migrate.sh" \
            --quiet
          gcloud run jobs execute cwlb-migrate \
            --region "$GCP_REGION" \
            --wait \
            --quiet

  # Runs in parallel with seed — frontend deploy and seeding are independent.
  deploy-frontend:
    name: Deploy Frontend
    needs: [check-changes, build-frontend, deploy-backend]
    # Run even when build-frontend was skipped (frontend unchanged); require
    # deploy-backend to have succeeded so the backend URL is stable.
    if: always() && needs.check-changes.result == 'success' && needs.deploy-backend.result == 'success' && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve frontend image tag
        id: image
        run: |
          BASE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPO/cwlb-frontend"
          if [ "${{ needs.check-changes.outputs.frontend_changed }}" = "true" ]; then
            echo "tag=$BASE:$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$BASE:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy frontend to Cloud Run
        run: |
          BACKEND_URL=$(gcloud run services describe cwlb-backend \
            --region "$GCP_REGION" \
            --format "value(status.url)")
          gcloud run deploy cwlb-frontend \
            --image "${{ steps.image.outputs.tag }}" \
            --region "$GCP_REGION" \
            --platform managed \
            --port 3000 \
            --set-env-vars "BACKEND_URL=$BACKEND_URL" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --quiet

  # Only runs when alembic/, pipeline/, or seed scripts changed.
  # Three-phase fan-out pipeline: init → bootstrap (54 tasks) → finalize.
  seed:
    name: Seed Database
    needs: [check-changes, deploy-backend, check-seed]
    if: needs.check-seed.outputs.seed_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve backend image tag
        id: image
        run: |
          BASE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPO/cwlb-backend"
          if [ "${{ needs.check-changes.outputs.backend_changed }}" = "true" ]; then
            echo "tag=$BASE:$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$BASE:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Phase 1 — Init (wipe DB + migrate)
        run: |
          gcloud run jobs deploy cwlb-seed-init \
            --image "${{ steps.image.outputs.tag }}" \
            --region "$GCP_REGION" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 512Mi \
            --cpu 1 \
            --task-timeout 10m \
            --max-retries 1 \
            --command "bash" \
            --args "scripts/seed_init.sh" \
            --quiet
          gcloud run jobs execute cwlb-seed-init \
            --region "$GCP_REGION" \
            --wait \
            --quiet

      - name: Phase 2 — Bootstrap fan-out (54 tasks, 20 parallel)
        run: |
          gcloud run jobs deploy cwlb-seed-bootstrap \
            --image "${{ steps.image.outputs.tag }}" \
            --region "$GCP_REGION" \
            --tasks 54 \
            --parallelism 16 \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,GCS_CACHE_BUCKET=GCS_CACHE_BUCKET:latest" \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 2Gi \
            --cpu 1 \
            --task-timeout 30m \
            --max-retries 3 \
            --command "bash" \
            --args "scripts/seed_bootstrap.sh" \
            --quiet
          gcloud run jobs execute cwlb-seed-bootstrap \
            --region "$GCP_REGION" \
            --wait \
            --quiet

      - name: Phase 3 — Finalize (mark INGESTED + govinfo + law history + advance)
        run: |
          gcloud run jobs deploy cwlb-seed-finalize \
            --image "${{ steps.image.outputs.tag }}" \
            --region "$GCP_REGION" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,GCS_CACHE_BUCKET=GCS_CACHE_BUCKET:latest,GOVINFO_API_KEY=GOVINFO_API_KEY:latest,CONGRESS_API_KEY=CONGRESS_API_KEY:latest" \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --memory 8Gi \
            --cpu 2 \
            --task-timeout 90m \
            --max-retries 1 \
            --command "bash" \
            --args "scripts/seed_finalize.sh" \
            --quiet
          gcloud run jobs execute cwlb-seed-finalize \
            --region "$GCP_REGION" \
            --wait \
            --quiet
